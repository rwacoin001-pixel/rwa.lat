packages:
  - apps/*
  - packages/*

allowBuilds:
  '@scarf/scarf': false
  esbuild: true
  msw: false
  protobufjs: true
  sharp: true
  unrs-resolver: true
  workerd: true

# Kept in sync with pnpm-lock.yaml. pnpm 11 reads workspace-wide overrides
# from this file rather than the deprecated package.json "pnpm" field.
overrides:
  hono: 4.12.25
