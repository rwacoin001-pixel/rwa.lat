<!doctype html>
<html lang="en">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RWA.LAT</title></head>
  <body style="margin:0;background:#000;color:#F7F9FC;font:16px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:grid;min-height:100vh;place-items:center;text-align:center">
    <main><p style="color:#26E6B7;letter-spacing:.12em;font-size:12px">RWA.LAT</p><h1 id="title" style="font-size:28px;margin:8px 0">You’re offline.</h1><p id="body" style="margin:0;color:#9BA6B8">Your saved Demo pages remain available. Reconnect to refresh market data.</p></main>
    <script>
      const copy={zh:['当前处于离线状态','已保存的演示页面仍可浏览；重新联网后可刷新市场数据。'],hi:['आप ऑफ़लाइन हैं।','सहेजे गए डेमो पेज उपलब्ध हैं। बाज़ार डेटा ताज़ा करने के लिए दोबारा कनेक्ट करें।'],es:['Estás sin conexión.','Las páginas Demo guardadas siguen disponibles. Vuelve a conectarte para actualizar los datos.'],ar:['أنت غير متصل بالإنترنت.','تظل صفحات العرض المحفوظة متاحة. أعد الاتصال لتحديث بيانات السوق.'],fr:['Vous êtes hors ligne.','Les pages Demo enregistrées restent disponibles. Reconnectez-vous pour actualiser les données.'],pt:['Você está offline.','As páginas Demo salvas continuam disponíveis. Reconecte-se para atualizar os dados.']};
      const language=(navigator.language||'en').split('-')[0]; if(copy[language]){document.documentElement.lang=language;document.documentElement.dir=language==='ar'?'rtl':'ltr';document.getElementById('title').textContent=copy[language][0];document.getElementById('body').textContent=copy[language][1]}
    </script>
  </body>
</html>
