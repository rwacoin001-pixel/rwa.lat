name: rwa-lat-production

x-runtime-security: &runtime-security
  init: true
  read_only: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,size=64m
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true

services:
  api:
    <<: *runtime-security
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    image: rwa-lat-api:${IMAGE_TAG:-local}
    env_file:
      - path: ${RWA_ENV_FILE:-./production.env}
        required: true
    environment:
      PORT: "4000"
    ports:
      - "127.0.0.1:${API_HOST_PORT:-4000}:4000"
    restart: unless-stopped
    mem_limit: 768m
    cpus: 1.0

  admin:
    <<: *runtime-security
    build:
      context: ..
      dockerfile: deploy/Dockerfile.admin
    image: rwa-lat-admin:${IMAGE_TAG:-local}
    env_file:
      - path: ${RWA_ENV_FILE:-./production.env}
        required: true
    environment:
      PORT: "4100"
    ports:
      - "127.0.0.1:${ADMIN_HOST_PORT:-4100}:4100"
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.75

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    image: rwa-lat-api:${IMAGE_TAG:-local}
    env_file:
      - path: ${RWA_ENV_FILE:-./production.env}
        required: true
    command: ["pnpm", "--dir", "apps/api", "db:migration:run:prod"]
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    profiles: ["release"]

